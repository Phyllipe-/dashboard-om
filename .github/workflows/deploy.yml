name: Deploy — Hetzner

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Build & Deploy dashboard-om
    runs-on: [self-hosted, linux, x64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy local
        run: |
          cp -r dist/. /var/www/dashboard-om/
          echo "Deploy concluído: $(date)"
