name: Deploy — Hetzner

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Build & Deploy dashboard-om
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via rsync
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          rsync -az --delete \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            dist/ \
            "root@[2a01:4f8:1c0c:6fa1::1]:/var/www/dashboard-om/"
          rm -f /tmp/deploy_key
